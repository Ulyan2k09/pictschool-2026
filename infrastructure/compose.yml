services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "pictschool"
      POSTGRES_USER: "pictschool"
      POSTGRES_PASSWORD: "pictschool"
    volumes:
      - user_db:/var/lib/postgresql/data

  simulation:
    build:
      context: ..
      dockerfile: infrastructure/docker/simulation.Dockerfile
    environment:
      PYTHONUNBUFFERED: "1"

  backend:
    build:
      context: ..
      dockerfile: infrastructure/docker/backend.Dockerfile
    environment:
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: "8080"
      SIM_TCP_HOST: "simulation"
      SIM_TCP_COMMAND_PORT: "5055"
      SIM_TCP_TELEMETRY_PORT: "5056"
      AUTH_ENABLED: "true"
      DATABASE_URL: "jdbc:postgresql://postgres:5432/pictschool"
      DATABASE_USER: "pictschool"
      DATABASE_PASSWORD: "pictschool"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - simulation

  ui:
    build:
      context: ..
      dockerfile: infrastructure/docker/ui.Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  user_db:
